{% load static %}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="{% static 'inventory_app/css/styles.css' %}" rel="stylesheet" />
  </head>

  <body class="login-body">
    <div class="login-box">
      <h2 class="mb-4 text-center">Inventario</h2>

      <form method="post">
        {% csrf_token %}

        <input
          type="text"
          name="username"
          class="form-control mb-3"
          placeholder="Usuario"
        />

        <input
          type="password"
          name="password"
          class="form-control mb-3"
          placeholder="Contraseña"
        />

        <button class="btn btn-login w-100">Ingresar</button>
      </form>
    </div>
  </body>
</html>
