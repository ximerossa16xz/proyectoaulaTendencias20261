{% load static %}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Inventario{% endblock %}</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="{% static 'inventory_app/css/styles.css' %}" rel="stylesheet" />
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container-fluid px-4">
        <a class="navbar-brand fw-bold" href="{% url 'dashboard' %}">
        Inventario
        </a>

        <button
          class="navbar-toggler"
          data-bs-toggle="collapse"
          data-bs-target="#menu"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link" href="{% url 'dashboard' %}">Dashboard</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'products' %}">Productos</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'categories' %}">Categorías</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'suppliers' %}">Proveedores</a>
            </li>
          </ul>

          <ul class="navbar-nav ms-auto align-items-center">
            <li class="nav-item me-3">
              {% if user.is_staff %}
              <span class="badge bg-pink">Admin</span>
              {% else %}
              <span class="badge bg-info">Usuario</span>
              {% endif %}
            </li>

            <li class="nav-item me-3">
              <span class="text-light">{{ user.username }}</span>
            </li>

            <li class="nav-item">
              <a href="{% url 'logout' %}" class="btn btn-light btn-sm px-3"
                >Salir</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container-fluid px-5 mt-4">
      {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'inventory_app/js/app.js' %}"></script>
    {% block extra_js %}{% endblock %}
  </body>
</html>
